<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日新教师 AI 工作台</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <nav class="topbar" aria-label="页面导航">
        <a class="brand" href="#">日新教师 AI 工作台</a>
        <div class="nav-links">
          <a href="#tools">工具入口</a>
          <a href="#prompts">提示词</a>
        </div>
      </nav>

      <section class="hero-inner" aria-labelledby="hero-title">
        <div class="hero-copy">
          <h1 id="hero-title">日新教师 AI 工作台</h1>
          <p class="hero-text">从真实教学任务出发，找到合适的工具和提示词。</p>
          <div class="hero-actions">
            <a class="button primary" href="#tools">查看工具</a>
            <a class="button secondary" href="#prompts">查看提示词</a>
          </div>
        </div>
      </section>
    </header>

    <main>
      <section class="section tools-section" id="tools" aria-labelledby="tools-title">
        <div class="tools-head">
          <div class="section-heading compact">
            <p class="eyebrow">工具卡片</p>
            <h2 id="tools-title">工具入口</h2>
          </div>
          <p class="result-count" id="tool-result-count"></p>
        </div>
        <div class="tool-grid" id="tool-grid"></div>
      </section>

      <section class="section prompt-section" id="prompts" aria-labelledby="prompts-title">
        <div class="tools-head">
          <div class="section-heading compact">
            <p class="eyebrow">提示词工作台</p>
            <h2 id="prompts-title">常用提示词</h2>
          </div>
          <p class="result-count" id="prompt-result-count"></p>
        </div>
        <div class="prompt-grid" id="prompt-grid"></div>
      </section>

      <section class="section privacy-section" id="privacy" aria-labelledby="privacy-title">
        <div>
          <p class="eyebrow">隐私提醒</p>
          <h2 id="privacy-title">先脱敏，再使用</h2>
        </div>
        <p>涉及学生姓名、照片、作文、评语、家庭信息等内容，请先脱敏。生成内容必须由教师审核后再使用。</p>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>树懒</strong>
        <span>公众号：字里行间的算法</span>
      </div>
    </footer>

    <dialog class="tool-dialog" id="detail-dialog" aria-labelledby="dialog-title">
      <div class="dialog-shell">
        <button class="icon-button" id="dialog-close" aria-label="关闭详情">×</button>
        <div id="dialog-content"></div>
      </div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
